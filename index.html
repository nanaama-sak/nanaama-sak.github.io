<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Blog</title>
<meta name="description" content="" id="meta-desc">
<link id="gfont-link" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&family=Spectral:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=Bitter:wght@300;400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<title>Loading...</title>
<style>


:root {
  --bg:#fff;--surface:#faf7f9;--text:#1a0e1e;--muted:#7a5870;
  --accent:#d4457a;--accent2:#8b3060;--border:#e8d0dc;--card:#fdf8fb;
  --nav-bg:#fff;--nav-border:#1a0e1e;--nav-text:#1a0e1e;
  --hf:'Syne',sans-serif;--bf:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--bf);font-size:14px;line-height:1.7;transition:background .25s,color .25s;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

/* NAV */
nav{background:var(--nav-bg);color:var(--nav-text);padding:0 2rem;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  border-bottom:3px solid var(--nav-border);min-height:54px;flex-wrap:wrap;gap:.4rem;
  transition:background .25s,border-color .25s;}
.nav-brand{font-family:var(--hf);font-size:1.25rem;font-weight:800;color:var(--nav-text);
  letter-spacing:-.02em;cursor:pointer;flex-shrink:0;transition:color .25s;}
.nav-right{display:flex;align-items:stretch;flex-wrap:wrap;}
.nav-right button{background:none;border:none;color:var(--nav-text);font-family:var(--bf);
  font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.9rem .95rem;cursor:pointer;opacity:.5;
  transition:opacity .2s;border-bottom:2px solid transparent;}
.nav-right button:hover{opacity:.85;}
.nav-right button.active{opacity:1;border-bottom-color:var(--accent);}
.nav-search-btn{font-size:.9rem!important;letter-spacing:0!important;text-transform:none!important;}
.nav-edit-btn{opacity:.2!important;font-size:.55rem!important;padding:.9rem .65rem!important;
  border-bottom:none!important;letter-spacing:.08em!important;font-style:italic!important;}
.nav-edit-btn:hover{opacity:.45!important;}

/* SEARCH */
.search-bar{display:none;background:var(--surface);border-bottom:1px solid var(--border);
  padding:.6rem 2rem;position:relative;}
.search-bar.open{display:flex;align-items:center;gap:.7rem;}
.search-bar input{flex:1;background:none;border:none;outline:none;font-family:var(--bf);
  font-size:.82rem;color:var(--text);padding:.3rem 0;}
.search-bar input::placeholder{color:var(--muted);opacity:.6;}
.search-bar-icon{color:var(--muted);font-size:.85rem;}
.search-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:0 .2rem;}
.search-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card);
  border:1px solid var(--border);border-top:none;z-index:50;max-height:380px;overflow-y:auto;display:none;}
.search-dropdown.open{display:block;}
.sr-item{padding:.75rem 2rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.sr-item:hover{background:var(--surface);}
.sr-item:last-child{border-bottom:none;}
.sr-type{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.18rem;}
.sr-title{font-family:var(--hf);font-size:.95rem;font-weight:700;}
.sr-snip{font-size:.7rem;color:var(--muted);margin-top:.1rem;}
.sr-empty{padding:1.2rem 2rem;color:var(--muted);font-size:.78rem;text-align:center;}

/* PAGES */
.page{display:none;animation:fadeUp .28s ease;}
.page.active{display:block;}
#post-view{display:none;animation:fadeUp .28s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* HERO */
.hero{padding:4.5rem 2rem 3.5rem;max-width:920px;margin:0 auto;
  display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;}
.hero-text h1{font-family:var(--hf);font-size:clamp(2.5rem,5.5vw,4rem);
  font-weight:800;line-height:1.02;letter-spacing:-.03em;}
.hero-text h1 em{font-style:normal;color:var(--accent);}
.hero-subtitle{margin-top:.9rem;color:var(--muted);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;}
.hero-bio{margin-top:1.2rem;font-size:.82rem;line-height:1.95;}
.hero-img-wrap{aspect-ratio:3/4;overflow:hidden;border:2px solid var(--nav-border);
  background:var(--surface);display:flex;align-items:center;justify-content:center;}
.hero-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.hero-placeholder{text-align:center;padding:2rem;color:var(--muted);font-size:.7rem;line-height:1.9;}

/* SECTION */
.section-wrap{max-width:920px;margin:0 auto;padding:2.5rem 2rem 3.5rem;}
.section-header{border-bottom:3px solid var(--nav-border);padding-bottom:.75rem;margin-bottom:2.5rem;
  display:flex;align-items:flex-end;justify-content:space-between;
  transition:border-color .25s;}
.section-header h2{font-family:var(--hf);font-size:1.9rem;font-weight:800;letter-spacing:-.02em;}
.section-sub{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
.section-bio{margin-bottom:2rem;font-size:.82rem;line-height:1.95;color:var(--muted);}

/* TAG FILTER */
.tag-filter{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.6rem;}
.tag-pill{font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;
  background:var(--surface);border:1px solid var(--border);
  padding:.22rem .6rem;cursor:pointer;color:var(--muted);transition:all .15s;}
.tag-pill:hover,.tag-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* FEATURED CARD */
.featured-card{background:var(--surface);border:2px solid var(--accent);
  padding:1.6rem 1.8rem;margin-bottom:1.8rem;transition:transform .2s;}
.featured-card:hover{transform:translateX(4px);}
.featured-label{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent);margin-bottom:.5rem;display:block;}
.featured-card h3{font-family:var(--hf);font-size:1.5rem;font-weight:800;
  cursor:pointer;letter-spacing:-.02em;line-height:1.1;}
.featured-card h3:hover{color:var(--accent);}
.featured-meta{font-size:.64rem;color:var(--muted);margin-top:.35rem;}
.featured-excerpt{margin-top:.7rem;font-size:.8rem;line-height:1.9;}
.featured-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.7rem;}

/* POST CARDS */
.posts-list{display:flex;flex-direction:column;gap:1.6rem;}
.post-card{background:var(--card);border:2px solid var(--nav-border);
  padding:1.5rem 1.7rem;transition:border-color .2s,transform .2s;position:relative;}
.post-card:hover{border-color:var(--accent);transform:translateX(4px);}
.post-card-cat{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.45rem;}
.post-card h3{font-family:var(--hf);font-size:1.4rem;font-weight:800;cursor:pointer;letter-spacing:-.02em;line-height:1.1;}
.post-card h3:hover{color:var(--accent);}
.post-card-meta{font-size:.62rem;color:var(--muted);margin-top:.32rem;}
.post-card-excerpt{margin-top:.65rem;font-size:.79rem;line-height:1.88;}
.post-card-img{margin-top:.85rem;overflow:hidden;border:1px solid var(--border);max-height:220px;}
.post-card-img img{width:100%;height:220px;object-fit:cover;display:block;}
.post-tags{display:flex;flex-wrap:wrap;gap:.28rem;margin-top:.65rem;}
.post-tag-pill{font-size:.56rem;letter-spacing:.06em;background:var(--surface);
  border:1px solid var(--border);padding:.14rem .48rem;color:var(--muted);}
.read-more{display:inline-block;margin-top:.7rem;font-size:.65rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--accent);cursor:pointer;
  border-bottom:1px solid transparent;transition:border-color .2s;}
.read-more:hover{border-color:var(--accent);}
.draft-badge{position:absolute;top:.55rem;right:.75rem;font-size:.55rem;
  letter-spacing:.1em;text-transform:uppercase;background:#e8a020;color:#fff;padding:.14rem .45rem;}

/* FULL POST */
.post-full{max-width:720px;margin:0 auto;padding:3rem 2rem;}
.post-full-back{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;color:var(--accent);margin-bottom:1.8rem;display:inline-flex;align-items:center;gap:.4rem;}
.post-full-cat{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);}
.post-full h1{font-family:var(--hf);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;
  margin-top:.45rem;line-height:1.08;letter-spacing:-.02em;}
.post-full-meta{font-size:.65rem;color:var(--muted);margin:.65rem 0 1.3rem;}
.post-full-img{margin:1.3rem 0;border:2px solid var(--border);}
.post-full-img img{width:100%;max-height:400px;object-fit:cover;display:block;}
.post-body{font-size:.86rem;line-height:2.1;}
.post-body h2{font-family:var(--hf);font-size:1.4rem;font-weight:800;margin:1.4rem 0 .4rem;letter-spacing:-.02em;}
.post-body h3{font-family:var(--hf);font-size:1.1rem;font-weight:700;margin:1.1rem 0 .3rem;}
.post-body p{margin-bottom:.85rem;}
.post-body strong{font-weight:700;}
.post-body em{font-style:italic;}
.post-body a{color:var(--accent);text-decoration:underline;}
.post-body blockquote{border-left:3px solid var(--accent);padding:.45rem 1rem;
  margin:.9rem 0;color:var(--muted);font-style:italic;}
.post-body ul,.post-body ol{padding-left:1.4rem;margin:.5rem 0 .85rem;}
.post-body li{margin-bottom:.28rem;}
.post-full-tags{display:flex;flex-wrap:wrap;gap:.32rem;margin-top:1.5rem;
  padding-top:.9rem;border-top:1px solid var(--border);}

/* GALLERY */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.85rem;}
.gallery-item{aspect-ratio:1;overflow:hidden;background:var(--surface);
  border:2px solid var(--nav-border);cursor:pointer;position:relative;transition:border-color .2s;}
.gallery-item:hover{border-color:var(--accent);}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s;}
.gallery-item:hover img{transform:scale(1.05);}
.gallery-caption{position:absolute;bottom:0;left:0;right:0;
  background:rgba(26,14,30,.85);color:#fff;font-size:.62rem;padding:.32rem .5rem;
  transform:translateY(100%);transition:transform .25s;}
.gallery-item:hover .gallery-caption{transform:translateY(0);}
.lightbox{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.94);
  align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:80vh;object-fit:contain;}
.lb-cap{color:rgba(255,255,255,.6);font-size:.75rem;margin-top:.85rem;}
.lb-close{position:absolute;top:1.5rem;right:2rem;background:none;border:none;
  color:#fff;font-size:2rem;cursor:pointer;opacity:.6;line-height:1;}
.lb-close:hover{opacity:1;}

/* SHOP */
.shop-notice{background:var(--surface);border:1px solid var(--border);
  padding:.85rem 1.1rem;margin-bottom:1.8rem;font-size:.78rem;line-height:1.75;color:var(--muted);}
.shop-cats{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.5rem;}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.5rem;}
.product-card{background:var(--card);border:2px solid var(--nav-border);
  display:flex;flex-direction:column;transition:border-color .2s,transform .2s;}
.product-card:hover{border-color:var(--accent);transform:translateY(-3px);}
.product-img{aspect-ratio:1;overflow:hidden;background:var(--surface);
  border-bottom:2px solid var(--nav-border);position:relative;}
.product-img img{width:100%;height:100%;object-fit:cover;display:block;}
.product-img-ph{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;color:var(--muted);font-size:.7rem;}
.sold-overlay{position:absolute;inset:0;background:rgba(255,255,255,.72);
  display:flex;align-items:center;justify-content:center;}
.sold-label{font-family:var(--hf);font-size:1rem;font-weight:800;
  color:var(--text);border:2px solid var(--text);padding:.25rem .85rem;letter-spacing:.05em;}
.product-body{padding:1.05rem 1.15rem;flex:1;display:flex;flex-direction:column;gap:.35rem;}
.product-cat-tag{font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);}
.product-name{font-family:var(--hf);font-size:1.15rem;font-weight:800;letter-spacing:-.01em;}
.product-edition{font-size:.62rem;color:var(--muted);}
.product-price{font-size:.88rem;font-weight:700;color:var(--text);}
.product-price.inquiry{font-style:italic;font-size:.75rem;color:var(--muted);font-weight:400;}
.product-desc{font-size:.73rem;line-height:1.75;color:var(--muted);flex:1;}
.product-actions{display:flex;gap:.5rem;margin-top:.85rem;flex-wrap:wrap;}
.product-btn{flex:1;min-width:0;padding:.52rem .7rem;font-family:var(--bf);font-size:.62rem;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:2px solid var(--nav-border);
  background:var(--nav-border);color:var(--bg);transition:all .18s;text-align:center;
  text-decoration:none;display:block;}
.product-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;text-decoration:none;}
.product-btn.ghost{background:none;color:var(--text);}
.product-btn.ghost:hover{border-color:var(--accent);color:var(--accent);background:none;}
.product-btn:disabled{background:var(--surface);color:var(--muted);border-color:var(--border);cursor:not-allowed;}

/* CV */
.cv-wrap{max-width:600px;}
.cv-empty{color:var(--muted);font-size:.8rem;font-style:italic;padding:2.5rem 0;text-align:center;}
.cv-file-card{display:flex;align-items:center;gap:1.2rem;
  background:var(--surface);border:2px solid var(--nav-border);padding:1.2rem 1.5rem;}
.cv-icon{font-size:2rem;color:var(--accent);}
.cv-info{flex:1;}
.cv-filename{font-family:var(--hf);font-size:1.05rem;font-weight:700;}
.cv-sub{font-size:.67rem;color:var(--muted);margin-top:.18rem;}
.cv-dl-btn{padding:.55rem 1.1rem;background:var(--nav-border);color:var(--bg);
  border:none;font-family:var(--bf);font-size:.68rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;transition:background .18s;flex-shrink:0;}
.cv-dl-btn:hover{background:var(--accent);}

/* WORKS PAGE */
.works-toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;margin-bottom:1.4rem;}
.works-type-filter{display:flex;flex-wrap:wrap;gap:.32rem;flex:1;}
.works-view-toggle{display:flex;gap:0;border:2px solid var(--nav-border);flex-shrink:0;}
.wvt-btn{background:none;border:none;padding:.32rem .7rem;cursor:pointer;font-family:var(--bf);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);transition:all .15s;line-height:1;}
.wvt-btn.active{background:var(--nav-border);color:var(--bg);}
.wvt-btn:hover:not(.active){background:var(--surface);}
.works-masonry{columns:3;column-gap:1rem;}
@media(max-width:700px){.works-masonry{columns:2;}}
@media(max-width:440px){.works-masonry{columns:1;}}
.work-card{break-inside:avoid;background:var(--card);border:2px solid var(--nav-border);margin-bottom:1rem;display:inline-block;width:100%;transition:border-color .2s;}
.work-card:hover{border-color:var(--accent);}
.work-card-media{width:100%;border-bottom:2px solid var(--nav-border);position:relative;overflow:hidden;}
.work-card-media img{width:100%;display:block;transition:transform .35s;}
.work-card:hover .work-card-media img{transform:scale(1.03);}
.work-card-media-ph{display:flex;align-items:center;justify-content:center;background:var(--surface);min-height:120px;flex-direction:column;gap:.4rem;}
.work-media-icon{font-size:1.6rem;opacity:.35;}
.work-media-src{font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.work-card-body{padding:.7rem .85rem;}
.work-type-tag{font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.18rem;}
.work-title{font-family:var(--hf);font-size:1rem;font-weight:800;letter-spacing:-.01em;line-height:1.1;}
.work-year{font-size:.58rem;color:var(--muted);margin-top:.1rem;}
.work-desc{font-size:.72rem;line-height:1.8;color:var(--muted);margin-top:.35rem;}
.work-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.5rem;}
.work-tag{font-size:.5rem;letter-spacing:.06em;background:var(--surface);border:1px solid var(--border);padding:.1rem .38rem;color:var(--muted);}
.work-embed{border:1px solid var(--border);background:var(--surface);}
.work-card-body .work-embed{margin-top:.55rem;}
.work-card>.work-embed{border-top:none;border-left:none;border-right:none;}
.work-card-embed>.work-embed{margin-bottom:0;}
.work-card-embed>.work-embed iframe{display:block;}
.work-embed iframe{width:100%;display:block;border:none;}
.work-embed-bar{display:flex;align-items:center;gap:.55rem;padding:.4rem .6rem;}
.web-play{width:1.4rem;height:1.4rem;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.web-play::after{content:"▶";font-size:.45rem;color:#fff;margin-left:1px;}
.web-wave{flex:1;height:.4rem;background:repeating-linear-gradient(90deg,var(--accent) 0,var(--accent) 2px,var(--border) 2px,var(--border) 5px);border-radius:2px;}
.web-src{font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
.work-pdf-bar{display:flex;align-items:center;gap:.55rem;padding:.38rem .6rem;margin-top:.55rem;background:var(--surface);border:1px solid var(--border);}
.work-pdf-icon{font-size:1.1rem;color:var(--accent);flex-shrink:0;}
.work-pdf-info{flex:1;font-size:.55rem;color:var(--muted);}
.work-pdf-dl{font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);cursor:pointer;flex-shrink:0;background:none;border:none;font-family:var(--bf);}
.work-pdf-dl:hover{text-decoration:underline;}
.work-link-btn{display:inline-block;margin-top:.55rem;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s;}
.work-link-btn:hover{border-color:var(--accent);text-decoration:none;}
.works-list{display:flex;flex-direction:column;gap:0;}
.work-list-item{display:grid;grid-template-columns:200px 1fr;border:2px solid var(--nav-border);border-bottom:none;transition:border-color .2s;}
.work-list-item:last-child{border-bottom:2px solid var(--nav-border);}
.work-list-item:hover{border-color:var(--accent);}
.work-list-preview{border-right:2px solid var(--nav-border);display:flex;align-items:center;justify-content:center;background:var(--surface);overflow:hidden;min-height:140px;position:relative;}
.work-list-preview img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;}
.work-list-preview-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;width:100%;}
.work-list-content{padding:1.1rem 1.3rem;display:flex;flex-direction:column;justify-content:center;}
.work-list-title{font-family:var(--hf);font-size:1.25rem;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-bottom:.15rem;}
.work-list-meta{font-size:.62rem;color:var(--muted);margin-bottom:.4rem;}
.work-list-desc{font-size:.76rem;line-height:1.9;color:var(--muted);}
@media(max-width:600px){.work-list-item{grid-template-columns:1fr;}.work-list-preview{min-height:140px;border-right:none;border-bottom:2px solid var(--nav-border);}}

/* BACK TO TOP */
#btt{position:fixed;bottom:1.8rem;right:1.8rem;z-index:90;
  width:2.4rem;height:2.4rem;background:var(--nav-border);color:var(--bg);
  border:none;font-size:1rem;cursor:pointer;
  opacity:0;pointer-events:none;transition:opacity .3s,background .2s,transform .2s;
  display:flex;align-items:center;justify-content:center;}
#btt.vis{opacity:1;pointer-events:all;}
#btt:hover{background:var(--accent);transform:translateY(-3px);}

</style>
</head>
<body>
<!-- NAV -->
<nav id="main-nav">
  <span class="nav-brand" id="nav-brand" onclick="goHome()">My Blog</span>
  <div class="nav-right" id="nav-right"></div>
  <button class="nav-hamburger" id="nav-hamburger" onclick="toggleDrawer()" aria-label="Menu">
    <span></span><span></span><span></span>

<script>


// ══════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════

const DTABS = [

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let D={profile:{},tabs:[],posts:[],products:[],gallery:[],works:[],cv:{name:'',data:'',title:'Curriculum Vitae',bio:''},tabThemes:{}};
let pendPostImg='',pendProdImg='',pendWorkImg='',pendWorkPdf='',pendWorkPdfName='',pendWorkThumb='',curPage='home',prevPage='home',dragId=null;

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
async function init(){
  const loader=document.getElementById('init-loading');
  let remote=null;
  try{const r=await fetch('content.json?v='+Date.now());if(r.ok)remote=await r.json();}catch(e){}
  if(remote&&(remote.tabs||remote.posts||remote.profile)){
    D=remote;
  } else {
    const ls=tryLS();
    if(ls){D=ls;}
    else{if(loader)loader.innerHTML='<div style="color:#999;font-size:.8rem;padding:2rem;text-align:center">Could not load content.json</div>';return;}
  }
  D.profile=Object.assign({},DPROFILE,D.profile||{});
  D.tabs=(D.tabs&&D.tabs.length)?D.tabs:JSON.parse(JSON.stringify(DTABS));
  D.posts=D.posts||[];D.products=D.products||[];D.gallery=D.gallery||[];
  D.cv=Object.assign({name:'',data:'',title:'Curriculum Vitae',bio:''},D.cv||{});
  D.works=D.works||[];D.tabThemes=D.tabThemes||{};
  applyTheme(curPage);renderNav();renderPages();
  if(loader)loader.remove();
  initSearch();initBTT();
}
function tryLS(){try{const v=localStorage.getItem('blog_v5');return v?JSON.parse(v):null;}catch{return null;}}
function saveLS(){try{localStorage.setItem('blog_v5',JSON.stringify(D));}catch{}}
function today(){return new Date().toISOString().split('T')[0];}

// ══════════════════════════════════════════════════════════
// THEME ENGINE
// ══════════════════════════════════════════════════════════
function resolveTheme(tabId){
  const custom=D.tabThemes[tabId];
  if(custom&&custom.v)return custom;
  const tab=D.tabs.find(t=>t.id===tabId);
  return PRESETS[tab?.theme||'art']||PRESETS.art;
}

function applyTheme(tabId){
  const t=resolveTheme(tabId);
  const v=t.v||t.vars||{};
  const r=document.documentElement;
  const MAP={
    '--bg':'bg','--surface':'surface','--text':'text','--muted':'muted',
    '--accent':'accent','--accent2':'accent2','--border':'border','--card':'card',
    '--nav-bg':'navBg','--nav-border':'navBorder','--nav-text':'navText'
  };
  Object.entries(MAP).forEach(([cv,k])=>{if(v[k])r.style.setProperty(cv,v[k]);});
  const fk=t.fontKey||(PRESETS[D.tabs.find(x=>x.id===tabId)?.theme||'art']?.fontKey)||'syne-spacemono';
  const fp=FONTS[fk]||FONTS['syne-spacemono'];
  r.style.setProperty('--hf',fp.hf);
  r.style.setProperty('--bf',fp.bf);
}

// ══════════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════════
function renderNav(){
  document.getElementById('nav-brand').textContent=D.profile.siteTitle||'My Blog';
  document.title=D.profile.siteTitle||'My Blog';
  const d=document.getElementById('meta-desc');if(d&&D.profile.seo)d.content=D.profile.seo;
  const nr=document.getElementById('nav-right');
  nr.innerHTML=D.tabs.filter(t=>!t.hidden).map(t=>
    `<button onclick="showPage('${t.id}',this)" data-pid="${t.id}">${esc(t.name)}</button>`
  ).join('')+
  `<button class="nav-search-btn" onclick="toggleSearch()" title="Search">&#128269;</button>`+
  "";
  nr.querySelectorAll('button[data-pid]').forEach(b=>b.classList.toggle('active',b.dataset.pid===curPage));
  renderDrawer();
}

function goHome(){const f=D.tabs.find(t=>!t.hidden);if(f)showById(f.id);}

// ══════════════════════════════════════════════════════════
// PAGES
// ══════════════════════════════════════════════════════════
function renderPages(){
  const c=document.getElementById('pages-container');
  c.innerHTML='';
  D.tabs.forEach(tab=>{
    const div=document.createElement('div');
    div.className='page';div.id='pg-'+tab.id;
    div.innerHTML=pageHTML(tab);
    c.appendChild(div);
  });
  const tgt=document.getElementById('pg-'+curPage);
  if(tgt)tgt.classList.add('active');
  else{const f=D.tabs.find(t=>!t.hidden);if(f){curPage=f.id;document.getElementById('pg-'+f.id)?.classList.add('active');}}
  renderAllPosts();renderGallery();renderShop();renderCVPage();renderAllWorks();
}

function pageHTML(tab){
  if(tab.type==='home')return homeHTML();
  if(tab.type==='gallery')return galleryHTML(tab);
  if(tab.type==='shop')return shopHTML(tab);
  if(tab.type==='cv')return cvHTML(tab);
  if(tab.type==='works')return worksHTML(tab);
  return postsHTML(tab);
}

function homeHTML(){
  const p=D.profile;
  return `<div class="hero">
    <div class="hero-text">
      <h1>Hello, I'm <em id="h-name">${esc(p.name||'Your Name')}</em></h1>
      <p class="hero-subtitle" id="h-tag">${esc(p.tagline||'')}</p>
      <p class="hero-bio" id="h-bio">${esc(p.bio||'')}</p>
    </div>
    <div class="hero-img-wrap">
      <div id="hero-ph" style="${p.profilePhoto?'display:none':''}">
        <div class="hero-placeholder">&#9711;<br>Profile photo<br><span style="font-size:.62rem">Upload in editor</span></div>
      </div>
      <img id="hero-img" src="${p.profilePhoto||''}" alt="" style="${p.profilePhoto?'':'display:none'}">
    </div>
  </div>
  <div class="section-wrap">
    <div class="section-header"><h2>Recent Posts</h2><span class="section-sub">All work</span></div>
    <div id="posts-home"></div>
  </div>`;
}

function postsHTML(tab){
  return `<div class="section-wrap">
    <div class="section-header"><h2>${esc(tab.name)}</h2><span class="section-sub">${esc(tab.sub||'')}</span></div>

    <div class="tag-filter" id="tf-${tab.id}"></div>
    <div id="posts-${tab.id}"></div>
  </div>`;
}

  return `<div class="section-wrap">
    <div class="section-header"><h2>${esc(tab.name)}</h2><span class="section-sub">${esc(tab.sub||'')}</span></div>
    ${tab.bio?`<p class="section-bio">${esc(tab.bio)}</p>`:''}
    <div class="gallery-grid" id="gallery-grid"></div>
    <p id="gal-empty" style="color:var(--muted);font-size:.78rem;display:none;text-align:center;padding:2rem">No images yet.</p>

function shopHTML(tab){
  return `<div class="section-wrap">
    <div class="section-header"><h2>${esc(tab.name)}</h2><span class="section-sub">${esc(tab.sub||'Shop')}</span></div>
    ${tab.bio?`<p class="section-bio">${esc(tab.bio)}</p>`:''}
    <div id="shop-notice"></div>
    <div class="shop-cats" id="shop-cats"></div>
    <div class="shop-grid" id="shop-grid"></div>

function worksHTML(tab){
  return `<div class="section-wrap">

      </div>
    </div>
    <div id="works-masonry-${tab.id}" class="works-masonry"></div>
    <div id="works-list-${tab.id}" class="works-list" style="display:none"></div>
    <p id="works-empty-${tab.id}" style="color:var(--muted);font-size:.78rem;display:none;text-align:center;padding:2.5rem 0">No works yet — add some in the editor.</p>

  return `<div class="section-wrap">

// ══════════════════════════════════════════════════════════
// POST LISTS
// ══════════════════════════════════════════════════════════
function renderAllPosts(){
  renderHomeRecent();
  D.tabs.filter(t=>t.type==='posts').forEach(t=>renderTabPosts(t.id,null));
  renderTagFilters();
}

function isDraft(p){return p.draft===true||p.draft==='true'||p.draft==='on';}

function pubPosts(tabId){
  return D.posts.filter(p=>p.cat===tabId&&!isDraft(p)).sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function renderHomeRecent(){
  const el=document.getElementById('posts-home');if(!el)return;
  const all=D.posts.filter(p=>!isDraft(p)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!all.length){el.innerHTML='<p style="color:var(--muted);font-size:.78rem">No posts yet — add some in the editor.</p>';return;}
  const feat=all.find(p=>p.featured);
  const rest=all.filter(p=>!feat||p.id!==feat.id).slice(0,feat?3:4);
  el.innerHTML=(feat?featCardHTML(feat):'')+(rest.length?`<div class="posts-list">${rest.map(postCardHTML).join('')}</div>`:'');
}

function renderTabPosts(tabId,filterTag){
  const el=document.getElementById('posts-'+tabId);if(!el)return;
  let posts=pubPosts(tabId);
  if(filterTag)posts=posts.filter(p=>(p.tags||[]).some(t=>t.toLowerCase()===filterTag.toLowerCase()));
  if(!posts.length){
    el.innerHTML=`<p style="color:var(--muted);font-size:.78rem">No posts${filterTag?' tagged "'+esc(filterTag)+'"':''} yet.</p>`;return;
  }
  const feat=!filterTag&&posts.find(p=>p.featured);
  const rest=posts.filter(p=>!feat||p.id!==feat.id);
  el.innerHTML=(feat?featCardHTML(feat):'')+(rest.length?`<div class="posts-list">${rest.map(postCardHTML).join('')}</div>`:'');
}

function renderTagFilters(){
  D.tabs.filter(t=>t.type==='posts').forEach(tab=>{
    const el=document.getElementById('tf-'+tab.id);if(!el)return;
    const tags=[...new Set(pubPosts(tab.id).flatMap(p=>p.tags||[]))].sort();
    if(!tags.length){el.innerHTML='';return;}
    el.innerHTML=`<span class="tag-pill active" onclick="filterTag('${tab.id}',null,this)">All</span>`+
      tags.map(t=>`<span class="tag-pill" onclick="filterTag('${tab.id}','${esc(t)}',this)">${esc(t)}</span>`).join('');
  });
}

function filterTag(tabId,tag,el){
  document.querySelectorAll(`#tf-${tabId} .tag-pill`).forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderTabPosts(tabId,tag);
}

function featCardHTML(p){
  const tab=D.tabs.find(t=>t.id===p.cat);
  return `<div class="featured-card">
    <span class="featured-label">Featured</span>
    <h3 onclick="openPost('${p.id}')">${esc(p.title)}</h3>
    <div class="featured-meta">${esc(tab?tab.name:p.cat)} &mdash; ${fmtDate(p.date)}</div>
    ${p.excerpt?`<div class="featured-excerpt">${esc(p.excerpt)}</div>`:''}
    ${p.tags&&p.tags.length?`<div class="featured-tags">${p.tags.map(t=>`<span class="post-tag-pill">${esc(t)}</span>`).join('')}</div>`:''}
    <span class="read-more" onclick="openPost('${p.id}')">Read more &rarr;</span>
  </div>`;
}

function postCardHTML(p){
  const tab=D.tabs.find(t=>t.id===p.cat);
  const img=p.image?`<div class="post-card-img"><img src="${p.image}" alt="${esc(p.title)}"></div>`:'';
  return `<div class="post-card">
    ${p.draft?'<span class="draft-badge">Draft</span>':''}
    <div class="post-card-cat">${esc(tab?tab.name:p.cat)}</div>
    <h3 onclick="openPost('${p.id}')">${esc(p.title)}</h3>
    <div class="post-card-meta">${fmtDate(p.date)}</div>
    ${p.excerpt?`<div class="post-card-excerpt">${esc(p.excerpt)}</div>`:''}
    ${img}
    ${p.tags&&p.tags.length?`<div class="post-tags">${p.tags.map(t=>`<span class="post-tag-pill">${esc(t)}</span>`).join('')}</div>`:''}
    <span class="read-more" onclick="openPost('${p.id}')">Read more &rarr;</span>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// POST VIEW
// ══════════════════════════════════════════════════════════
function openPost(id){
  const p=D.posts.find(x=>x.id===id);if(!p)return;
  if(isDraft(p)){alert('This post is a draft — not publicly visible.');return;}
  prevPage=curPage;
  const tab=D.tabs.find(t=>t.id===p.cat);
  document.getElementById('pv-cat').textContent=tab?tab.name:p.cat;
  document.getElementById('pv-title').textContent=p.seoTitle||p.title;
  document.getElementById('pv-meta').textContent=fmtDate(p.date);
  document.getElementById('pv-body').innerHTML=p.body||'';
  const iw=document.getElementById('pv-imgwrap');
  if(p.image){document.getElementById('pv-img').src=p.image;iw.style.display='block';}
  else iw.style.display='none';
  const tagsEl=document.getElementById('pv-tags');
  tagsEl.innerHTML=p.tags&&p.tags.length?p.tags.map(t=>`<span class="post-tag-pill">${esc(t)}</span>`).join(''):'';
  document.title=(p.seoTitle||p.title)+' — '+(D.profile.siteTitle||'My Blog');
  const md=document.getElementById('meta-desc');if(md&&p.seoDesc)md.content=p.seoDesc;
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById('post-view').style.display='block';
  window.scrollTo(0,0);
}

function closePost(){
  document.getElementById('post-view').style.display='none';
  document.title=D.profile.siteTitle||'My Blog';
  const md=document.getElementById('meta-desc');if(md&&D.profile.seo)md.content=D.profile.seo;
  showById(prevPage);
}

// ══════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════
function showPage(id,btn){
  showById(id);
  document.querySelectorAll('.nav-right button[data-pid]').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
}

function showById(id){
  closeDrawer();

function renderShop(){
  const grid=document.getElementById('shop-grid');
  const empty=document.getElementById('shop-empty');
  const catsEl=document.getElementById('shop-cats');
  const noticeEl=document.getElementById('shop-notice');
  if(!grid)return;
  if(noticeEl&&D.profile.shopNotice)
    noticeEl.innerHTML=`<div class="shop-notice">${esc(D.profile.shopNotice)}</div>`;
  else if(noticeEl)noticeEl.innerHTML='';
  const cats=[...new Set(D.products.map(p=>p.cat).filter(Boolean))];
  if(catsEl)catsEl.innerHTML=cats.length?
    '<span class="tag-pill active" onclick="filterShop(null,this)">All</span>'+
    cats.map(c=>`<span class="tag-pill" onclick="filterShop('${esc(c)}',this)">${esc(c)}</span>`).join(''):'';
  if(!D.products.length){grid.innerHTML='';if(empty)empty.style.display='block';return;}
  if(empty)empty.style.display='none';
  grid.innerHTML=D.products.map(prodCardHTML).join('');
}

function filterShop(cat,el){
  document.querySelectorAll('.shop-cats .tag-pill').forEach(p=>p.classList.remove('active'));
  if(el)el.classList.add('active');
  const grid=document.getElementById('shop-grid');if(!grid)return;
  grid.innerHTML=(cat?D.products.filter(p=>p.cat===cat):D.products).map(prodCardHTML).join('');
}

function prodCardHTML(p){
  const handle=p.link||D.profile.payHandle||'';
  const memo=encodeURIComponent(p.memo||p.name||'');
  const payUrl=handle?(handle.includes('?')?handle+'&note='+memo:handle+'?note='+memo):'#';
  const artEmail=D.profile.artEmail||'';
  const mailto=artEmail?`mailto:${artEmail}?subject=${encodeURIComponent('Inquiry: '+(p.name||''))}&body=${encodeURIComponent('Hi, I\'m interested in "'+p.name+'".')}`:'';
  const buyBtn=p.soldOut?`<button class="product-btn" disabled>Sold Out</button>`:
    p.inquiryOnly?'':
    `<a href="${esc(payUrl)}" target="_blank" rel="noopener" class="product-btn" style="text-decoration:none">Buy</a>`;
  const inquireBtn=mailto?`<a href="${esc(mailto)}" class="product-btn ghost" style="text-decoration:none">Inquire</a>`:'';
  return `<div class="product-card">
    <div class="product-img">
      ${p.image?`<img src="${p.image}" alt="${esc(p.name||'')}">`:
        `<div class="product-img-ph">No image</div>`}
      ${p.soldOut?`<div class="sold-overlay"><div class="sold-label">Sold Out</div></div>`:''}
    </div>
    <div class="product-body">
      ${p.cat?`<div class="product-cat-tag">${esc(p.cat)}</div>`:''}
      <div class="product-name">${esc(p.name||'Untitled')}</div>
      ${p.edition?`<div class="product-edition">${esc(p.edition)}</div>`:''}
      ${p.inquiryOnly?`<div class="product-price inquiry">Price on inquiry</div>`:
        p.price?`<div class="product-price">${esc(p.price)}</div>`:''}
      ${p.desc?`<div class="product-desc">${esc(p.desc)}</div>`:''}
      <div class="product-actions">${buyBtn}${inquireBtn}</div>
    </div>
  </div>`;
}

function setWorksView(tabId,view,btn){
  const masonry=document.getElementById('works-masonry-'+tabId);

  const mBtn=document.getElementById('wv-masonry-'+tabId);
  const lBtn=document.getElementById('wv-list-'+tabId);
  if(!masonry||!list)return;
  if(view==='masonry'){
    masonry.style.display='';list.style.display='none';

  } else {
    masonry.style.display='none';list.style.display='';
    lBtn&&lBtn.classList.add('active');mBtn&&mBtn.classList.remove('active');
  }
}

function renderWorks(tabId, filterType){
  const mEl=document.getElementById('works-masonry-'+tabId);
  const lEl=document.getElementById('works-list-'+tabId);
  const emEl=document.getElementById('works-empty-'+tabId);
  const tfEl=document.getElementById('wtf-'+tabId);
  if(!mEl)return;
  const all=D.works.filter(w=>w.tabId===tabId).sort((a,b)=>(b.year||'')-(a.year||''));
  // type filter pills
  if(tfEl){
    const types=[...new Set(all.map(w=>w.type).filter(Boolean))].sort();
    tfEl.innerHTML=types.length?
      `<span class="tag-pill active" onclick="filterWorks('${tabId}',null,this)">All</span>`+
      types.map(t=>`<span class="tag-pill" onclick="filterWorks('${tabId}','${esc(t)}',this)">${esc(t)}</span>`).join(''):'';
  }
  const shown=filterType?all.filter(w=>w.type===filterType):all;
  if(!shown.length){
    mEl.innerHTML='';if(lEl)lEl.innerHTML='';
    if(emEl)emEl.style.display='block';return;
  }
  if(emEl)emEl.style.display='none';
  mEl.innerHTML=shown.map(workMasonryCard).join('');
  if(lEl)lEl.innerHTML=shown.map(workListItem).join('');
}

function filterWorks(tabId,type,el){
  document.querySelectorAll('#wtf-'+tabId+' .tag-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderWorks(tabId,type);
}

function workEmbedHTML(w){
  if(w.mediaType==='image'&&w.image) return '';
  if(w.mediaType==='pdf'&&w.pdfData) return '';
  if(w.mediaType==='link'&&w.link) return '';
  if((w.mediaType==='soundcloud'||w.mediaType==='bandcamp'||w.mediaType==='spotify'||w.mediaType==='youtube')&&w.embedUrl){
    // build iframe src
    let src=w.embedUrl;
    let h=w.mediaType==='youtube'?315:w.mediaType==='spotify'?152:166;
    return `<div class="work-embed"><iframe src="${esc(src)}" height="${h}" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>`;
  }
  return '';
}

function workMediaPreview(w,forList){
  const sz=forList?'':'';
  if(w.mediaType==='image'&&w.image){
    return `<div class="work-card-media"><img src="${w.image}" alt="${esc(w.title||'')}"></div>`;
  }
  if(w.mediaType==='pdf'&&w.pdfData){
    if(w.allowDownload===false){
      // inline preview — embed the PDF so it can be read but not easily saved
      const h=forList?220:260;
      return `<div class="work-card-media" style="border-bottom:2px solid var(--nav-border)">
        <iframe src="${w.pdfData}" style="width:100%;height:${h}px;display:block;border:none;pointer-events:auto" title="${esc(w.title||'PDF')}"></iframe>
      </div>`;
    }
    return `<div class="work-card-media-ph" style="min-height:${forList?140:110}px">
      <span class="work-media-icon">📎</span><span class="work-media-src">PDF</span></div>`;
  }
  // link type with thumbnail — show image, clicking goes to the link
  if(w.mediaType==='link'&&w.thumbnail){
    return `<div class="work-card-media" style="position:relative">
      <img src="${w.thumbnail}" alt="${esc(w.title||'')}" style="width:100%;display:block;transition:transform .35s">
      <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);
        padding:.28rem .5rem;display:flex;align-items:center;gap:.35rem">
        <span style="font-size:.75rem;color:rgba(255,255,255,.7)">&#8599;</span>
        <span style="font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6)">${esc((w.mediaType||'').toUpperCase())}</span>
      </div>
    </div>`;
  }
  const icons={soundcloud:'♪',bandcamp:'♫',spotify:'▶',youtube:'▶',link:'↗'};
  const icon=icons[w.mediaType]||'○';
  const label=(w.mediaType||'').toUpperCase()||'MEDIA';
  return `<div class="work-card-media-ph" style="min-height:${forList?140:100}px">
    <span class="work-media-icon">${icon}</span><span class="work-media-src">${label}</span></div>`;
}

function workExtras(w){
  let out='';
  if(w.mediaType==='pdf'&&w.pdfData){
    if(w.allowDownload!==false){
      out+=`<div class="work-pdf-bar">
        <span class="work-pdf-icon">📎</span>
        <span class="work-pdf-info">${esc(w.pdfName||'document.pdf')}</span>
        <button class="work-pdf-dl" onclick="downloadWork('${w.id}')">Download PDF</button>
      </div>`;
    } else {
      out+=`<div class="work-pdf-bar">
        <span class="work-pdf-icon">📎</span>
        <span class="work-pdf-info" style="flex:1">${esc(w.pdfName||'document.pdf')}</span>
        <span style="font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);opacity:.7">View only</span>
      </div>`;
    }
  } else if(w.embedUrl&&w.mediaType!=='image'){
    out+=workEmbedHTML(w);
  }
  if(w.link&&w.mediaType==='link'){
    out+=`<a href="${esc(w.link)}" target="_blank" rel="noopener" class="work-link-btn">View work &#8599;</a>`;
  }
  return out;
}

function workMasonryCard(w){
  const tags=(w.tags||[]).map(t=>`<span class="work-tag">${esc(t)}</span>`).join('');
  const canExpand=w.mediaType==='image'&&w.image||w.mediaType==='pdf'&&w.pdfData;
  const mediaHTML=workMediaPreview(w,false);
  // wrap media in clickable div if expandable
  const media=canExpand?
    mediaHTML.replace('<div class="work-card-media"',
      `<div class="work-card-media clickable" onclick="openWorkViewer('${w.id}')"`)
    :mediaHTML;
  // for embed types, show the embed in the media slot (above card body) not below text
  const isEmbed=['soundcloud','bandcamp','spotify','youtube'].includes(w.mediaType)&&w.embedUrl;
  const embedAbove=isEmbed?workEmbedHTML(w):'';
  return `<div class="work-card${isEmbed?' work-card-embed':''}">
    ${isEmbed?embedAbove:media}
    <div class="work-card-body">
      ${w.type?`<div class="work-type-tag">${esc(w.type)}</div>`:''}
      <div class="work-title">${esc(w.title||'Untitled')}</div>
      ${w.year||w.medium?`<div class="work-year">${[w.year,w.medium].filter(Boolean).join(' · ')}</div>`:''}
      ${w.desc?`<div class="work-desc">${esc(w.desc)}</div>`:''}
      ${!isEmbed?workExtras(w):''}
      ${tags?`<div class="work-tags">${tags}</div>`:''}
    </div>
    ${canExpand?`<button class="work-expand-btn" onclick="openWorkViewer('${w.id}')">Expand &#8599;</button>`:''}
  </div>`;
}

function workListItem(w){
  const tags=(w.tags||[]).map(t=>`<span class="work-tag">${esc(t)}</span>`).join('');
  const canExpand=w.mediaType==='image'&&w.image||w.mediaType==='pdf'&&w.pdfData;
  const hasThumbLink=w.mediaType==='link'&&w.thumbnail&&w.link;
  const previewInner=w.mediaType==='image'&&w.image?
    `<img src="${w.image}" alt="${esc(w.title||'')}">`:
    w.mediaType==='link'&&w.thumbnail?
    `<img src="${w.thumbnail}" alt="${esc(w.title||'')}">`:
    `<div class="work-list-preview-ph">${workMediaPreview(w,true)}</div>`;
  const previewCls=canExpand?'work-list-preview clickable':hasThumbLink?'work-list-preview clickable':'work-list-preview';
  const previewClick=canExpand?`onclick="openWorkViewer('${w.id}')" style="cursor:zoom-in"`:
    hasThumbLink?`onclick="window.open('${esc(w.link)}','_blank')" style="cursor:pointer"`:''  ;
  const isEmbed=['soundcloud','bandcamp','spotify','youtube'].includes(w.mediaType)&&w.embedUrl;
  return `<div class="work-list-item">
    <div class="${previewCls}" ${previewClick}>${previewInner}</div>
    <div class="work-list-content">
      ${w.type?`<div class="work-type-tag">${esc(w.type)}</div>`:''}
      <div class="work-list-title">${esc(w.title||'Untitled')}</div>
      <div class="work-list-meta">${[w.year,w.medium].filter(Boolean).join(' · ')}</div>
      ${isEmbed?workEmbedHTML(w):''}
      ${w.desc?`<div class="work-list-desc">${esc(w.desc)}</div>`:''}
      ${!isEmbed?workExtras(w):''}
      ${tags?`<div class="work-tags" style="margin-top:.5rem">${tags}</div>`:''}
      ${canExpand?`<button class="work-expand-btn" style="margin-top:.7rem;border-top:none;padding-left:0;text-align:left" onclick="openWorkViewer('${w.id}')">Expand &#8599;</button>`:''}
    </div>
  </div>`;
}

function downloadWork(id){
  const w=D.works.find(x=>x.id===id);if(!w||!w.pdfData)return;
  const a=document.createElement('a');a.href=w.pdfData;a.download=w.pdfName||'work.pdf';a.click();
}

function initSearch(){
  const input=document.getElementById('search-input');
  const dd=document.getElementById('search-dropdown');
  const clr=document.getElementById('search-clear');
  if(input){
    input.addEventListener('input',()=>{
      const q=input.value.trim().toLowerCase();
      clr.style.display=q?'block':'none';
      if(!q){dd.classList.remove('open');return;}
      const hits=doSearch(q);
      dd.innerHTML=hits.length?hits.map(h=>`
        <div class="sr-item" onclick="srGo('${h.type}','${h.id}')">
          <div class="sr-type">${esc(h.type)}</div>
          <div class="sr-title">${esc(h.title)}</div>
          ${h.snip?`<div class="sr-snip">${esc(h.snip.slice(0,90))}&#8230;</div>`:''}
        </div>`).join(''):
        `<div class="sr-empty">No results for "${esc(q)}"</div>`;
      dd.classList.add('open');
    });
  }
  if(clr)clr.addEventListener('click',clearSearch);
  document.addEventListener('click',e=>{
    if(!document.getElementById('search-bar').contains(e.target))dd.classList.remove('open');
  });
}

function doSearch(q){
  const hits=[];
  D.posts.filter(p=>!p.draft).forEach(p=>{
    if([p.title,p.excerpt,p.body,...(p.tags||[])].join(' ').toLowerCase().includes(q))
      hits.push({type:'Post',id:p.id,title:p.title,snip:p.excerpt||''});
  });
  D.works.forEach(w=>{
    if([w.title,w.desc,w.type,w.medium,...(w.tags||[])].join(' ').toLowerCase().includes(q))
      hits.push({type:'Work',id:'work:'+w.id,title:w.title,snip:w.desc||w.medium||''});
  });
  D.products.forEach(p=>{
    if([p.name,p.desc,p.cat].join(' ').toLowerCase().includes(q))
      hits.push({type:'Shop',id:'prod:'+p.id,title:p.name,snip:p.desc||''});
  });
  return hits.slice(0,10);
}

function srGo(type,id){
  clearSearch();closeSearch();
  if(type==='Post')openPost(id);
  else if(type==='Shop'){const st=D.tabs.find(t=>t.type==='shop');if(st)showById(st.id);}
  else if(type==='Work'){const wid=id.replace('work:','');const w=D.works.find(x=>x.id===wid);if(w)showById(w.tabId);}
}

function clearSearch(){
  sv('search-input','');
  const dd=document.getElementById('search-dropdown');if(dd)dd.classList.remove('open');
  const clr=document.getElementById('search-clear');if(clr)clr.style.display='none';
}

function toggleSearch(){
  const bar=document.getElementById('search-bar');
  bar.classList.toggle('open');
  if(bar.classList.contains('open'))document.getElementById('search-input')?.focus();
  else clearSearch();
}

function closeSearch(){document.getElementById('search-bar').classList.remove('open');clearSearch();}

let wvCurrentId=null,wvList=[];

function openWorkViewer(id){
  const w=D.works.find(x=>x.id===id);if(!w)return;
  wvCurrentId=id;
  // build list of viewable works in same tab for prev/next
  wvList=D.works.filter(x=>x.tabId===w.tabId&&
    (x.mediaType==='image'||x.mediaType==='pdf'));
  renderWorkViewer(w);
  document.getElementById('wv-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('wv-overlay').scrollTop=0;
}

function closeWorkViewer(){
  document.getElementById('wv-overlay').classList.remove('open');
  document.body.style.overflow='';
  wvCurrentId=null;
}

function wvNavigate(dir){
  const idx=wvList.findIndex(x=>x.id===wvCurrentId);
  if(idx<0)return;
  const next=wvList[idx+dir];
  if(!next)return;
  wvCurrentId=next.id;
  renderWorkViewer(next);
  document.getElementById('wv-overlay').scrollTop=0;
}

function renderWorkViewer(w){
  const idx=wvList.findIndex(x=>x.id===w.id);
  const hasPrev=idx>0, hasNext=idx<wvList.length-1;
  let mediaHtml='';
  if(w.mediaType==='image'&&w.image){
    mediaHtml=`<img class="wv-img" src="${w.image}" alt="${esc(w.title||'')}">`;
  } else if(w.mediaType==='pdf'&&w.pdfData){
    mediaHtml=`<iframe class="wv-pdf" src="${w.pdfData}" title="${esc(w.title||'PDF')}"></iframe>`;
  }
  const tags=(w.tags||[]).map(t=>`<span class="wv-tag">${esc(t)}</span>`).join('');
  const dlBtn=w.mediaType==='pdf'&&w.pdfData&&w.allowDownload!==false?
    `<button class="wv-dl" onclick="downloadWork('${w.id}')">&#8595; Download PDF</button>`:'';
  const nav=(hasPrev||hasNext)?`<div class="wv-nav">
    ${hasPrev?`<button class="wv-nav-btn" onclick="wvNavigate(-1)">&#8592; Previous</button>`:''}
    ${hasNext?`<button class="wv-nav-btn" onclick="wvNavigate(1)">Next &#8594;</button>`:''}
  </div>`:'';
  document.getElementById('wv-inner').innerHTML=`
    ${w.type?`<div class="wv-type">${esc(w.type)}</div>`:''}
    <div class="wv-title">${esc(w.title||'Untitled')}</div>
    <div class="wv-meta">${[w.year,w.medium].filter(Boolean).join(' · ')}</div>
    ${mediaHtml}
    ${w.desc?`<div class="wv-desc">${esc(w.desc)}</div>`:''}
    ${dlBtn}
    ${tags?`<div class="wv-tags">${tags}</div>`:''}
    ${nav}
  `;
}

init();
